<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="theme-color" content="#0087d4" />
		<meta name="color-scheme" content="dark light" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />

		<script>
			const themeValue = JSON.parse(localStorage.getItem('pl:theme'))?.current;
			const systemPreferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
				? 'dark'
				: 'light';

			document.documentElement.classList.remove('light', 'dark');
			document.documentElement.classList.add(themeValue ?? systemPreferredTheme);
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
